server {
    listen 80;
    server_name localhost;

    # Where the built React files live
    root /usr/share/nginx/html;
    index index.html;

    # ── React Router support ───────────────
    # React is a Single Page Application (SPA)
    # ALL routes serve index.html
    # React Router then reads the URL and shows
    # the right component (LoginPage, DashboardPage etc)
    # Without this, refreshing /dashboard gives 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ──────────────────────────
    # Forward /api/ requests to the backend
    # The frontend never needs to know the
    # backend's port or internal address
    location /api/ {
        proxy_pass         http://api:5000;
        # "api" is the service name in docker-compose.yml
        # Docker networking resolves it automatically

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # ── Health check proxy ─────────────────
    location /health {
        proxy_pass http://api:5000/health;
    }

    # ── Cache static assets ────────────────
    # Tell browsers to cache JS/CSS/images
    # "immutable" means do not check for updates
    # The build hash in filenames handles cache-busting
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security Headers ───────────────────
    # Basic OWASP-recommended headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}