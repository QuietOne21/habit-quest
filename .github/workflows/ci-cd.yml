
name: HabitQuest CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time
# If a new push comes in, cancel the old deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  # ───────────────────────────────────────────
  # JOB 1: Run Backend Tests
  # ───────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your code into the GitHub runner

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
          # Caches node_modules between runs for speed

      - name: Install dependencies
        run: npm ci
        # ci = clean install (faster and safer than npm install)

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: habitquest_test
          DB_USER: test
          DB_PASSWORD: test

  # ───────────────────────────────────────────
  # JOB 2: Build Frontend
  # ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend-test
    # Only runs if backend-test passes

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          # This reads from GitHub repository secrets
          # Set it to your Render.com backend URL
          # Settings → Secrets → REACT_APP_API_URL

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/build
          # Saves the build folder for the deploy job

  # ───────────────────────────────────────────
  # JOB 3: Deploy to GitHub Pages
  # Only runs on push to main (not on PRs)
  # ───────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Only deploy on actual pushes to main
    # Not on pull requests

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      # Sets the deployment URL in GitHub Actions UI

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: |
          echo "✅ Deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "Frontend is live!"